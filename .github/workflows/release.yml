name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create extension ZIP
        run: |
          zip -r envjumper-${{ github.ref_name }}.zip \
            _locales/ \
            background/ \
            content/ \
            icons/ \
            popup/ \
            manifest.json \
            LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: envjumper-${{ github.ref_name }}.zip
          generate_release_notes: true
