<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440">
  <title>EnvJumper — Promo 440x280</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1623 0%, #1a2540 60%, #1e2d3d 100%);
      color: #f7fafc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 32px 28px 32px;
      position: relative;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: absolute;
      top: -60px;
      right: 100px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(66,153,225,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Left content */
    .content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo img {
      height: 26px;
    }

    .logo-name {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.02em;
    }

    .tagline {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      color: #fff;
    }

    .tagline span {
      color: #63b3ed;
    }

    .sub {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: rgba(72,187,120,0.15);
      border: 1px solid rgba(72,187,120,0.3);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: #68d391;
      width: fit-content;
    }

    /* Right: mini popup mockup */
    .popup {
      width: 148px;
      background: #1e2433;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1;
      margin-left: 20px;
    }

    .popup-tabs {
      display: flex;
      background: #161b27;
      padding: 0 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .popup-tab {
      padding: 7px 6px;
      font-size: 9px;
      font-weight: 500;
      color: #4a5568;
    }

    .popup-tab.active {
      color: #63b3ed;
      border-bottom: 2px solid #63b3ed;
    }

    .popup-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .group-label {
      font-size: 8px;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 2px 4px;
    }

    .env-card {
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .env-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 7px;
      border-left: 2px solid;
    }

    .env-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .env-name {
      font-size: 9px;
      font-weight: 600;
      flex: 1;
      color: #e2e8f0;
    }

    .env-badge-current {
      font-size: 7px;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 600;
    }

    .env-links {
      padding: 4px 7px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .env-link {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 8px;
      color: #718096;
      padding: 2px 0;
    }

    .env-link-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #4a5568;
      flex-shrink: 0;
    }

    .env-nav-btns {
      display: flex;
      gap: 3px;
    }

    .env-nav-btn {
      width: 16px;
      height: 16px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="logo">
      <img src="../../icons/logo-envjumper.png" alt="EnvJumper">
      <span class="logo-name">EnvJumper</span>
    </div>

    <div class="tagline">
      Switch environments<br><span>in one click</span>
    </div>

    <div class="sub">
      Path preserved.<br>Colored border. CMS links. Basic Auth.
    </div>

    <div class="badge">
      ✓ Free &amp; open source
    </div>
  </div>

  <div class="popup">
    <div class="popup-tabs">
      <div class="popup-tab active">Jumper</div>
      <div class="popup-tab">Projects</div>
    </div>
    <div class="popup-body">
      <div class="group-label">My Project</div>

      <!-- Production open -->
      <div class="env-card">
        <div class="env-header" style="border-left-color:#EF4444;background:rgba(239,68,68,0.08);">
          <div class="env-dot" style="background:#EF4444;"></div>
          <span class="env-name">Production</span>
          <span class="env-badge-current" style="background:rgba(239,68,68,0.15);color:#fc8181;">Now</span>
        </div>
        <div class="env-links">
          <div class="env-link"><div class="env-link-dot"></div>Home /</div>
          <div class="env-link"><div class="env-link-dot"></div>Dashboard /admin</div>
          <div class="env-link"><div class="env-link-dot"></div>Settings /settings</div>
        </div>
      </div>

      <!-- Staging -->
      <div class="env-card">
        <div class="env-header" style="border-left-color:#F97316;">
          <div class="env-dot" style="background:#F97316;"></div>
          <span class="env-name">Staging</span>
          <div class="env-nav-btns">
            <div class="env-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5" width="8" height="8"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="env-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5" width="8" height="8"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Dev -->
      <div class="env-card">
        <div class="env-header" style="border-left-color:#10B981;">
          <div class="env-dot" style="background:#10B981;"></div>
          <span class="env-name">Dev</span>
          <div class="env-nav-btns">
            <div class="env-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5" width="8" height="8"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="env-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5" width="8" height="8"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
