<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EnvJumper</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/jumper.css">
  <link rel="stylesheet" href="styles/jumper-links.css">
  <link rel="stylesheet" href="styles/projects.css">
  <link rel="stylesheet" href="styles/projects-envs.css">
  <link rel="stylesheet" href="styles/projects-links.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body>
  <div id="app">

    <!-- En-tête -->
    <header class="header">
      <div class="header-brand">
        <img src="../icons/icon-48.png" alt="EnvJumper" class="header-icon" />
        <span class="header-title">EnvJumper</span>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab active" id="tab-jumper" role="tab" aria-selected="true" aria-controls="panel-jumper" data-i18n="tabJumper">
        </button>
        <button class="tab" id="tab-environments" role="tab" aria-selected="false" aria-controls="panel-environments" data-i18n="tabEnvironments">
        </button>
        <button class="tab" id="tab-settings" role="tab" aria-selected="false" aria-controls="panel-settings" data-i18n="tabSettings">
        </button>
      </nav>
    </header>

    <!-- Panneau : Jumper -->
    <main class="panel active" id="panel-jumper" role="tabpanel" aria-labelledby="tab-jumper">
      <div class="jumper-views-row">

        <!-- Vue principale : cards d'environnements -->
        <div class="jumper-view jumper-view--main">
          <div id="jumper-loading" class="state-loading">
            <div class="spinner"></div>
          </div>

          <!-- Cas : correspondance trouvée -->
          <div id="jumper-match" class="hidden">
            <div class="jumper-group-label" id="jumper-group-name"></div>
            <div id="jumper-cards-list">
              <!-- Cards des environnements injectées par JS -->
            </div>
          </div>

          <!-- Cas : aucune correspondance -->
          <div id="jumper-no-match" class="hidden">
            <div class="empty-state">
              <div class="empty-icon">🌐</div>
              <p class="empty-text" data-i18n="noMatchText"></p>
              <p class="empty-hostname" id="detected-hostname"></p>
              <button class="btn btn-primary" id="goto-settings-btn" data-i18n="noMatchBtn">
              </button>
            </div>
          </div>
        </div>

        <!-- Vue sélecteur de site (drill-down multisite) -->
        <div class="jumper-view jumper-view--sites" aria-hidden="true">
          <div class="jumper-site-header">
            <button class="jumper-back-btn" id="jumper-back-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
              <span data-i18n="back"></span>
            </button>
            <div class="jumper-site-header-titles">
              <div class="jumper-site-title" data-i18n="chooseSite"></div>
              <div class="jumper-site-subtitle" id="jumper-site-subtitle"></div>
            </div>
          </div>
          <div id="jumper-sites-list"></div>
        </div>

      </div>
    </main>

    <!-- Panneau : Environnements -->
    <main class="panel hidden" id="panel-environments" role="tabpanel" aria-labelledby="tab-environments">
      <div class="projects-views-row">

        <!-- Vue liste des projets -->
        <div class="projects-view projects-view--list">
          <div id="groups-list"></div>
          <div class="add-group-container">
            <button class="btn btn-outline btn-full" id="add-group-btn" data-i18n="addGroup"></button>
          </div>
        </div>

        <!-- Vue édition d'un projet (drill-down) -->
        <div class="projects-view projects-view--edit">
          <div class="project-edit-header">
            <button class="project-back-btn" id="project-back-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
              <span data-i18n="back"></span>
            </button>
            <div class="project-edit-title-area">
              <div class="project-edit-favicon-wrap">
                <img class="project-edit-favicon-img" id="project-edit-favicon-img" style="display:none" width="20" height="20" />
                <span class="project-edit-favicon-default" id="project-edit-favicon-default">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </span>
              </div>
              <input type="text" class="project-edit-name-input" id="project-edit-name-input" />
            </div>
          </div>

          <!-- Sous-onglets (sticky) -->
          <nav class="project-subtabs" role="tablist">
            <button class="project-subtab active" data-subtab="envs" role="tab" data-i18n="subtabEnvironments"></button>
            <button class="project-subtab" data-subtab="cms" role="tab">CMS</button>
            <button class="project-subtab" data-subtab="links" role="tab" data-i18n="linksSection"></button>
            <button class="project-subtab" data-subtab="settings" role="tab" data-i18n="projectSettings"></button>
          </nav>

          <!-- Zone scrollable -->
          <div class="editing-content">
            <div id="project-subtab-content" class="editing-content-inner"></div>
          </div>
        </div>

      </div>
    </main>

    <!-- Panneau : Paramètres -->
    <main class="panel hidden" id="panel-settings" role="tabpanel" aria-labelledby="tab-settings">

      <!-- Réglages d'affichage (badge position) -->
      <div id="general-settings-container"></div>

      <!-- Section Données : Export / Import -->
      <div class="export-import-section">
        <div class="section-title" data-i18n="dataSection"></div>

        <div class="export-row">
          <button class="btn btn-sm btn-outline" id="export-all-btn" data-i18n="exportAll"></button>
          <div class="export-group-row">
            <select class="select-sm" id="export-group-select">
              <option value="" data-i18n="chooseGroup"></option>
            </select>
            <button class="btn btn-sm btn-outline" id="export-group-btn" data-i18n="exportGroup"></button>
          </div>
        </div>

        <div class="import-row">
          <label class="btn btn-sm btn-outline import-label" for="import-file-input" data-i18n="importFile">
          </label>
          <input type="file" id="import-file-input" accept=".json" class="visually-hidden" />
        </div>

        <div id="import-error" class="alert alert-error hidden"></div>
        <div id="import-success" class="alert alert-success hidden"></div>
      </div>
    </main>

  </div>

  <!-- Modal de confirmation -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <p class="modal-message" id="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="confirm-cancel" data-i18n="cancel"></button>
        <button class="btn btn-danger" id="confirm-ok" data-i18n="delete"></button>
      </div>
    </div>
  </div>

  <!-- Modal import merge/replace -->
  <div id="import-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <p class="modal-message" data-i18n="importMergePrompt"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="import-merge-btn" data-i18n="importMerge"></button>
        <button class="btn btn-danger" id="import-replace-btn" data-i18n="importReplace"></button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
